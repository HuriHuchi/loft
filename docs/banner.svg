<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loft — a top slide-down shelf for macOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#232326"/>
      <stop offset="1" stop-color="#161618"/>
    </linearGradient>
    <linearGradient id="pane1" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#3a3a3c"/><stop offset="1" stop-color="#2e2e30"/>
    </linearGradient>
    <linearGradient id="pane2" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#e8e8ea"/><stop offset="1" stop-color="#d3d3d6"/>
    </linearGradient>
    <linearGradient id="pane3" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#3a3a3c"/><stop offset="1" stop-color="#2e2e30"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>

  <!-- menu-bar strip with the reveal chevron -->
  <rect x="0" y="0" width="1280" height="34" fill="#000000" opacity="0.35"/>
  <circle cx="26" cy="17" r="5" fill="#ff5f57"/>
  <circle cx="46" cy="17" r="5" fill="#febc2e"/>
  <circle cx="66" cy="17" r="5" fill="#28c840"/>
  <path d="M628 12 L640 24 L652 12" stroke="#9a9aa0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- the panel sliding down from the menu bar (right side) -->
  <g transform="translate(864,34)">
    <rect x="0" y="0" width="112" height="150" rx="10" fill="url(#pane1)"/>
    <rect x="124" y="0" width="150" height="150" rx="10" fill="url(#pane2)"/>
    <rect x="286" y="0" width="112" height="150" rx="10" fill="url(#pane3)"/>
    <!-- clipboard rows -->
    <rect x="14" y="18" width="84" height="12" rx="4" fill="#ffffff" opacity="0.14"/>
    <rect x="14" y="38" width="70" height="12" rx="4" fill="#ffffff" opacity="0.14"/>
    <rect x="14" y="58" width="84" height="12" rx="4" fill="#ffffff" opacity="0.14"/>
    <!-- notes lines -->
    <rect x="138" y="18" width="120" height="9" rx="4" fill="#000000" opacity="0.16"/>
    <rect x="138" y="34" width="104" height="9" rx="4" fill="#000000" opacity="0.16"/>
    <rect x="138" y="50" width="118" height="9" rx="4" fill="#000000" opacity="0.16"/>
    <rect x="138" y="66" width="72" height="9" rx="4" fill="#000000" opacity="0.16"/>
    <!-- file tiles -->
    <rect x="300" y="20" width="34" height="34" rx="7" fill="#ffffff" opacity="0.16"/>
    <rect x="348" y="20" width="34" height="34" rx="7" fill="#ffffff" opacity="0.16"/>
  </g>

  <!-- wordmark -->
  <text x="64" y="176" font-family="ui-sans-serif, -apple-system, Helvetica, Arial, sans-serif" font-size="104" font-weight="700" fill="#f5f5f7" letter-spacing="-2">Loft</text>
  <text x="70" y="230" font-family="ui-sans-serif, -apple-system, Helvetica, Arial, sans-serif" font-size="27" font-weight="500" fill="#a1a1a8">A top slide-down shelf for macOS.</text>
  <text x="70" y="266" font-family="ui-sans-serif, -apple-system, Helvetica, Arial, sans-serif" font-size="27" font-weight="500" fill="#6e6e76">Stash your clipboard, notes, and files — a scroll away.</text>
</svg>
