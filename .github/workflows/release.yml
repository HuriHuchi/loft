name: Release (manual)

# Manual fallback only. The primary release flow is release-please.yml, which
# bumps the version, creates the tag + GitHub Release, and builds. Use this when
# you need to (re)build and (re)publish the CURRENT package.json version by hand
# — e.g. a publish step failed, or you want to re-attach assets to an existing
# release. Run it from the Actions tab.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write # electron-builder needs this to create the Release
    steps:
      - uses: actions/checkout@v7

      # Reads the pnpm version from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish
        run: pnpm release
        env:
          # Lets electron-builder create the GitHub Release + upload assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned build: force-skip code signing. Do NOT pass CSC_LINK here —
          # when the secret is unset it becomes an empty string, which
          # electron-builder misreads as a cert path and fails with
          # "<workspace> not a file".
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # TODO(signing): to ship signed + notarized, add repo secrets
          #   CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID /
          #   APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
          # then replace the line above with these and set notarize: true:
          #   CSC_LINK: ${{ secrets.CSC_LINK }}
          #   CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts (also kept on the workflow run)
        uses: actions/upload-artifact@v7
        with:
          name: loft-mac
          path: dist/*.dmg
          if-no-files-found: ignore
