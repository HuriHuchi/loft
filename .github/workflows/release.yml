name: Release (manual)

# Manual fallback only. The primary release flow is release-please.yml, which
# bumps the version, creates the tag + GitHub Release, and builds. Use this when
# you need to (re)build and (re)publish the CURRENT package.json version by hand
# — e.g. a publish step failed, or you want to re-attach assets to an existing
# release. Run it from the Actions tab.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write # electron-builder needs this to create the Release
    steps:
      - uses: actions/checkout@v7

      # Reads the pnpm version from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish
        run: pnpm release
        env:
          # Lets electron-builder create the GitHub Release + upload assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Code signing (optional) ──────────────────────────────────────
          # When these secrets are absent, electron-builder logs a warning and
          # produces an UNSIGNED .dmg — the build still succeeds. Add them in
          # repo Settings → Secrets to enable signing + notarization:
          #   CSC_LINK                    base64 of your Developer ID .p12
          #   CSC_KEY_PASSWORD            password for that .p12
          #   APPLE_ID                    Apple Developer account email
          #   APPLE_APP_SPECIFIC_PASSWORD app-specific password for notarization
          #   APPLE_TEAM_ID               your 10-char Apple Team ID
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts (also kept on the workflow run)
        uses: actions/upload-artifact@v7
        with:
          name: loft-mac
          path: dist/*.dmg
          if-no-files-found: ignore
